# Netlify configuration for Message Loupe.
#
# Static export: Next.js produces an `out/` folder that we publish as-is.
# No serverless functions, no edge runtime, no middleware — pure CDN.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  # Use the project's pinned Node version on Netlify build runners.
  NODE_VERSION = "20"
  # Don't auto-install Netlify's Next.js plugin — we're shipping static HTML
  # and don't want it touching the build output.
  NEXT_PLUGIN_SKIPPED = "true"

# ---------- Security headers ----------
# A site that analyzes email authenticity must itself be exemplary on web
# security hygiene. Strict CSP, no third-party connect, no embedding.

[[headers]]
  for = "/*"
  [headers.values]
    # Defense-in-depth header set.
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP — the privacy promise made enforceable. No external connect, no
    # frames, no eval. 'unsafe-inline' is required for Next's small hydration
    # bootstrap and Tailwind's runtime style insertions.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'"

# Long-cache fingerprinted assets.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short-cache HTML so deploys roll out fast.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
